# GHCR Image Registry - Dynamic via env vars
# Images are built and pushed via GitHub Actions build-push.yml workflow
# REGISTRY, IMAGE_PREFIX, and IMAGE_TAG are set at runtime

services:
  nginx:
    image: ${REGISTRY}/${IMAGE_PREFIX}-nginx:${IMAGE_TAG:-1.0.0}
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  frontend:
    image: ${REGISTRY}/${IMAGE_PREFIX}-frontend:${IMAGE_TAG:-1.0.0}
    environment:
      - VITE_AUTH_SERVICE_URL=http://auth-service:3001
      - VITE_PRODUCT_SERVICE_URL=http://product-service:3000
      - VITE_ORDER_SERVICE_URL=http://order-service:3002
      - NODE_ENV=production
    depends_on:
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  auth-service:
    image: ${REGISTRY}/${IMAGE_PREFIX}-auth-service:${IMAGE_TAG:-1.0.0}
    environment:
      - PORT=${AUTH_PORT:-3001}
      - MONGODB_URI=mongodb://mongodb:27017/auth
      - JWT_SECRET=${JWT_SECRET:-efrei_super_pass}
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  product-service:
    image: ${REGISTRY}/${IMAGE_PREFIX}-product-service:${IMAGE_TAG:-1.0.0}
    environment:
      - PORT=${PRODUCT_PORT:-3000}
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce
      - JWT_SECRET=${JWT_SECRET:-efrei_super_pass}
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  order-service:
    image: ${REGISTRY}/${IMAGE_PREFIX}-order-service:${IMAGE_TAG:-1.0.0}
    environment:
      - PORT=${ORDER_PORT:-3002}
      - MONGODB_URI=mongodb://mongodb:27017/orders
      - JWT_SECRET=${JWT_SECRET:-efrei_super_pass}
      - VITE_PRODUCT_SERVICE_URL=http://product-service:3000
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      product-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  mongodb:
    image: mongo:7
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - staging-mongodb-data:/data/db
    networks:
      - staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  staging-network:
    driver: bridge

volumes:
  staging-mongodb-data:
