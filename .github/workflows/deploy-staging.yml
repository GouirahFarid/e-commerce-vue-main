# Deploy to Staging Environment
name: Deploy to Staging

on:
  push:
    branches: [develop, feature/ci-cd]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
      url: http://${{ secrets.STAGING_VPS_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Staging VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd /var/www/e-commerce || exit 1

            echo "Pulling latest changes from develop..."
            git fetch origin develop
            git checkout develop
            git pull origin develop

            if [ ! -f .env ]; then
              echo "Creating .env file..."
              cat > .env << 'EOF'
            MONGODB_URI=mongodb://mongodb:27017
            JWT_SECRET=staging_jwt_secret_change_me
            AUTH_PORT=3001
            PRODUCT_PORT=3000
            ORDER_PORT=3002
            FRONTEND_PORT=8080
            EOF
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true

            echo "Pulling latest images..."
            docker-compose -f docker-compose.prod.yml pull

            echo "Starting services..."
            docker-compose -f docker-compose.prod.yml up -d

            echo "Waiting for health checks..."
            sleep 20

            docker-compose -f docker-compose.prod.yml ps
            echo "Staging deployment completed!"