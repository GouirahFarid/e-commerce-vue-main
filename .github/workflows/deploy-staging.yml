# Deploy to Staging Environment
name: Deploy to Staging

on:
  workflow_run:
    workflows: [Build & Push]
    branches: [develop, feature/**]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/e-commerce
            sudo chown -R $USER:$USER /var/www/e-commerce
            sudo usermod -aG docker $USER 2>/dev/null || true

      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/var/www/e-commerce/"

      - name: Deploy to Staging VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/e-commerce

            if [ ! -f .env ]; then
              echo "Creating .env file..."
              cat > .env << 'EOF'
            MONGODB_URI=mongodb://mongodb:27017
            JWT_SECRET=staging_jwt_secret_change_me
            AUTH_PORT=3001
            PRODUCT_PORT=3000
            ORDER_PORT=3002
            FRONTEND_PORT=8080
            EOF
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest images..."
            sudo docker compose -f docker-compose.prod.yml pull

            echo "Starting services..."
            sudo docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for health checks..."
            sleep 20

            sudo docker compose -f docker-compose.prod.yml ps
            echo "Staging deployment completed!"