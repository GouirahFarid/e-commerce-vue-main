# Reusable Staging Deployment Workflow
# Called by ci.yml for develop branch
# Uses docker-compose.yml (staging configuration)
name: Deploy to Staging

on:
  workflow_call:
    secrets:
      STAGING_VPS_HOST:
        required: true
      STAGING_VPS_USER:
        required: true
      STAGING_VPS_SSH_KEY:
        required: true
      GITHUB_TOKEN:
        required: true

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/e-commerce
            sudo chown -R $USER:$USER /var/www/e-commerce
            sudo usermod -aG docker $USER 2>/dev/null || true

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/var/www/e-commerce/"

      - name: Copy init-products.sh script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          source: "scripts/init-products.sh"
          target: "/var/www/e-commerce/"

      - name: Deploy to Staging VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/e-commerce

            if [ ! -f .env ]; then
              echo "Creating .env file..."
              cat > .env << 'EOF'
            MONGODB_URI=mongodb://mongodb:27017
            JWT_SECRET=staging_jwt_secret_change_me
            AUTH_PORT=3001
            PRODUCT_PORT=3000
            ORDER_PORT=3002
            FRONTEND_PORT=8080
            EOF
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest images..."
            sudo docker compose pull

            echo "Starting services..."
            sudo docker compose up -d

            echo "Waiting for health checks..."
            sleep 20

            sudo docker compose ps

            echo "Executing init-products.sh script..."
            sudo docker compose cp /var/www/e-commerce/scripts/init-products.sh product-service:/tmp/init-products.sh
            sudo docker compose exec -T product-service sh /tmp/init-products.sh || echo "Note: Products may already exist or script failed"

            echo "Staging deployment completed!"
