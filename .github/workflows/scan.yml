# Reusable Trivy Security Scan Workflow
# Called by ci.yml after tests pass
name: Security Scan

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
    permissions:
      contents: read
      security-events: write

jobs:
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: frontend, context: ./frontend }
          - { name: auth-service, context: ./services/auth-service }
          - { name: product-service, context: ./services/product-service }
          - { name: order-service, context: ./services/order-service }
          - { name: nginx, context: ./nginx }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          tags: ghcr.io/gouirahfarid/e-commerce-vue-main-${{ matrix.service.name }}:scan-${{ inputs.sha }}
          load: true
          cache-from: type=gha
          platforms: linux/amd64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/gouirahfarid/e-commerce-vue-main-${{ matrix.service.name }}:scan-${{ inputs.sha }}
          format: 'sarif'
          output: 'trivy-${{ matrix.service.name }}-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service.name }}-results.sarif'
          category: 'trivy-${{ matrix.service.name }}'

      - name: Display scan results
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ghcr.io/gouirahfarid/e-commerce-vue-main-${{ matrix.service.name }}:scan-${{ inputs.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
