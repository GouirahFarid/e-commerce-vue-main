# Reusable Trivy Security Scan Workflow
# Called by ci.yml after tests pass
name: Security Scan

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string

jobs:
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: frontend, context: ./frontend }
          - { name: auth-service, context: ./services/auth-service }
          - { name: product-service, context: ./services/product-service }
          - { name: order-service, context: ./services/order-service }
          - { name: nginx, context: ./nginx }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: lowercase_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run Trivy vulnerability scanner (blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ github.event.repository.name }}-${{ matrix.service.name }}:1.0.0
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Run Trivy vulnerability scanner (SARIF for reporting)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ github.event.repository.name }}-${{ matrix.service.name }}:1.0.0
          format: 'sarif'
          output: 'trivy-${{ matrix.service.name }}-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service.name }}-results.sarif'
          category: 'trivy-${{ matrix.service.name }}'

      - name: Display scan results
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ github.event.repository.name }}-${{ matrix.service.name }}:1.0.0
          format: 'table'
          severity: 'CRITICAL,HIGH'
