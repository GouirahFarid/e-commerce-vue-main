# CI/CD Pipeline - Test → Build → Deploy
name: CI/CD

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Stage 1: Test
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: frontend, dir: ./frontend }
          - { name: auth-service, dir: ./services/auth-service }
          - { name: product-service, dir: ./services/product-service }
          - { name: order-service, dir: ./services/order-service }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.service.dir }}
        run: npm ci --legacy-peer-deps --no-audit

      - name: Run tests
        working-directory: ${{ matrix.service.dir }}
        run: npm test
        timeout-minutes: 10

  # Stage 2: Build & Push (runs after tests pass)
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: frontend, context: ./frontend }
          - { name: auth-service, context: ./services/auth-service }
          - { name: product-service, context: ./services/product-service }
          - { name: order-service, context: ./services/order-service }
          - { name: nginx, context: ./nginx }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gouirahfarid/e-commerce-vue-main-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Stage 3a: Deploy to Staging (after build, on develop/feature branches)
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref != 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/e-commerce
            sudo chown -R $USER:$USER /var/www/e-commerce
            sudo usermod -aG docker $USER 2>/dev/null || true

      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/var/www/e-commerce/"

      - name: Copy init-products.sh script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          source: "scripts/init-products.sh"
          target: "/var/www/e-commerce/"

      - name: Deploy to Staging VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/e-commerce

            if [ ! -f .env ]; then
              echo "Creating .env file..."
              cat > .env << 'EOF'
            MONGODB_URI=mongodb://mongodb:27017
            JWT_SECRET=staging_jwt_secret_change_me
            AUTH_PORT=3001
            PRODUCT_PORT=3000
            ORDER_PORT=3002
            FRONTEND_PORT=8080
            EOF
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest images..."
            sudo docker compose -f docker-compose.prod.yml pull

            echo "Starting services..."
            sudo docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for health checks..."
            sleep 20

            sudo docker compose -f docker-compose.prod.yml ps

            echo "Executing init-products.sh script..."
            sudo docker compose -f docker-compose.prod.yml cp /var/www/e-commerce/scripts/init-products.sh product-service:/tmp/init-products.sh
            sudo docker compose -f docker-compose.prod.yml exec -T product-service sh /tmp/init-products.sh || echo "Note: Products may already exist or script failed"

            echo "Staging deployment completed!"

  # Stage 3b: Deploy to Production (after build, on main branch)
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/e-commerce
            sudo chown -R $USER:$USER /var/www/e-commerce
            sudo usermod -aG docker $USER 2>/dev/null || true

      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/var/www/e-commerce/"

      - name: Copy init-products.sh script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          source: "scripts/init-products.sh"
          target: "/var/www/e-commerce/"

      - name: Deploy to Production VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/e-commerce

            if [ ! -f .env ]; then
              echo "ERROR: .env file not found!"
              exit 1
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Creating database backup..."
            sudo docker compose -f docker-compose.prod.yml exec -T mongodb mongodump --archive=/tmp/backup-$(date +%Y%m%d-%H%M%S).archive || echo "Warning: Backup failed"

            echo "Pulling latest images..."
            sudo docker compose -f docker-compose.prod.yml pull

            echo "Starting services..."
            sudo docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for health checks..."
            sleep 30

            sudo docker compose -f docker-compose.prod.yml ps

            echo "Executing init-products.sh script..."
            sudo docker compose -f docker-compose.prod.yml cp /var/www/e-commerce/scripts/init-products.sh product-service:/tmp/init-products.sh
            sudo docker compose -f docker-compose.prod.yml exec -T product-service sh /tmp/init-products.sh || echo "Note: Products may already exist or script failed"

            echo "Cleaning up old images..."
            sudo docker image prune -af --filter "until=72h"

            echo "Production deployment completed!"