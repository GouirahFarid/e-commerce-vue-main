# Deploy to Production Environment
name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: http://${{ secrets.PROD_VPS_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Production VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd /var/www/e-commerce || exit 1

            echo "Pulling latest changes from main..."
            git fetch origin main
            git checkout main
            git pull origin main

            if [ ! -f .env ]; then
              echo "ERROR: .env file not found!"
              exit 1
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Creating database backup..."
            docker-compose -f docker-compose.prod.yml exec -T mongodb mongodump --archive=/tmp/backup-$(date +%Y%m%d-%H%M%S).archive || echo "Warning: Backup failed"

            echo "Pulling latest images..."
            docker-compose -f docker-compose.prod.yml pull

            echo "Starting services..."
            docker-compose -f docker-compose.prod.yml up -d

            echo "Waiting for health checks..."
            sleep 30

            docker-compose -f docker-compose.prod.yml ps

            echo "Cleaning up old images..."
            docker image prune -af --filter "until=72h"

            echo "Production deployment completed!"