# CI Pipeline - Entry point for modular workflow
# Chain: test -> scan -> build -> deploy (staging/production)
name: CI

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Stage 1: Test all services
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: frontend, dir: ./frontend }
          - { name: auth-service, dir: ./services/auth-service }
          - { name: product-service, dir: ./services/product-service }
          - { name: order-service, dir: ./services/order-service }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ matrix.service.dir }}/node_modules
          key: ${{ matrix.service.name }}-node-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ matrix.service.name }}-node-

      - name: Install dependencies
        working-directory: ${{ matrix.service.dir }}
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run tests
        working-directory: ${{ matrix.service.dir }}
        run: npm test
        timeout-minutes: 10

  # Stage 2: Security scan (calls reusable scan workflow)
  scan:
    needs: [test, build]
    uses: ./.github/workflows/scan.yml
    permissions:
      contents: read
      security-events: write
    with:
      sha: ${{ github.sha }}

  # Stage 3: Build and push (calls reusable build workflow)
  # Runs in parallel with scan - only depends on test
  build:
    needs: test
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write
    with:
      sha: ${{ github.sha }}

  # Security gate: blocks deployment if scan fails
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [scan, build]
    if: always()
    steps:
      - name: Check scan results
        run: |
          if [ "${{ needs.scan.result }}" != "success" ]; then
            echo "Security scan failed - blocking deployment"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed - blocking deployment"
            exit 1
          fi
          echo "Security scan and build both passed"

  # Stage 4a: Deploy to Staging (develop branch only)
  deploy-staging:
    needs: security-gate
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-staging.yml
    secrets:
      STAGING_VPS_HOST: ${{ secrets.STAGING_VPS_HOST }}
      STAGING_VPS_USER: ${{ secrets.STAGING_VPS_USER }}
      STAGING_VPS_SSH_KEY: ${{ secrets.STAGING_VPS_SSH_KEY }}
    with:
      repository_owner: ${{ github.repository_owner }}
      repository_name: ${{ github.event.repository.name }}

  # Stage 4b: Deploy to Production (main branch only)
  deploy-production:
    needs: security-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-production.yml
    secrets:
      PROD_VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
      PROD_VPS_USER: ${{ secrets.PROD_VPS_USER }}
      PROD_VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    with:
      repository_owner: ${{ github.repository_owner }}
      repository_name: ${{ github.event.repository.name }}
