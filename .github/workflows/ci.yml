# CI Pipeline - Entry point for modular workflow
# Chain: test -> scan -> build -> deploy (staging/production)
name: CI

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Stage 1: Test all services
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: frontend, dir: ./frontend }
          - { name: auth-service, dir: ./services/auth-service }
          - { name: product-service, dir: ./services/product-service }
          - { name: order-service, dir: ./services/order-service }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.service.dir }}
        run: npm ci --legacy-peer-deps --no-audit

      - name: Run tests
        working-directory: ${{ matrix.service.dir }}
        run: npm test
        timeout-minutes: 10

  # Stage 2: Security scan (calls reusable scan workflow)
  scan:
    needs: test
    uses: ./.github/workflows/scan.yml
    with:
      sha: ${{ github.sha }}

  # Stage 3: Build and push (calls reusable build workflow)
  build:
    needs: scan
    uses: ./.github/workflows/build.yml
    with:
      sha: ${{ github.sha }}

  # Stage 4a: Deploy to Staging (develop branch)
  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-staging.yml
    secrets:
      STAGING_VPS_HOST: ${{ secrets.STAGING_VPS_HOST }}
      STAGING_VPS_USER: ${{ secrets.STAGING_VPS_USER }}
      STAGING_VPS_SSH_KEY: ${{ secrets.STAGING_VPS_SSH_KEY }}

  # Stage 4b: Deploy to Production (main branch)
  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/deploy-production.yml
    secrets:
      PROD_VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
      PROD_VPS_USER: ${{ secrets.PROD_VPS_USER }}
      PROD_VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
