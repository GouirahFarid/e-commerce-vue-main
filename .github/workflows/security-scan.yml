name: Security Scan

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker compose build
          docker compose -f docker-compose.prod.yml pull

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Scan individual images
        run: |
          # Scan nginx image
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --format table \
            ghcr.io/gouirahfarid/e-commerce-vue-main-nginx:latest || true

          # Scan frontend image
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --format table \
            ghcr.io/gouirahfarid/e-commerce-vue-main-frontend:latest || true

          # Scan auth-service image
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --format table \
            ghcr.io/gouirahfarid/e-commerce-vue-main-auth-service:latest || true

          # Scan product-service image
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --format table \
            ghcr.io/gouirahfarid/e-commerce-vue-main-product-service:latest || true

          # Scan order-service image
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --format table \
            ghcr.io/gouirahfarid/e-commerce-vue-main-order-service:latest || true

      - name: Generate security report
        if: always()
        run: |
          echo "# Security Scan Report" > security-report.md
          echo "" >> security-report.md
          echo "Generated on: $(date)" >> security-report.md
          echo "" >> security-report.md
          echo "## Scanned Images" >> security-report.md
          echo "- nginx:latest" >> security-report.md
          echo "- frontend:latest" >> security-report.md
          echo "- auth-service:latest" >> security-report.md
          echo "- product-service:latest" >> security-report.md
          echo "- order-service:latest" >> security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: |
            trivy-results.sarif
            security-report.md
          retention-days: 30
