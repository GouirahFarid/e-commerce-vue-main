# Reusable Build and Push Workflow
# Called by ci.yml after security scan passes
name: Build and Push

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    name: Build and Push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: frontend, context: ./frontend }
          - { name: auth-service, context: ./services/auth-service }
          - { name: product-service, context: ./services/product-service }
          - { name: order-service, context: ./services/order-service }
          - { name: nginx, context: ./nginx }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: lowercase_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ github.event.repository.name }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=1.0.0

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ github.event.repository.name }}-${{ matrix.service.name }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ github.event.repository.name }}-${{ matrix.service.name }}:buildcache,mode=max
          platforms: linux/amd64
